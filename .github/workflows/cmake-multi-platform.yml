name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Install Linux system dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgl1-mesa-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev \
          libxext-dev \
          libwayland-dev \
          libxkbcommon-dev \
          wayland-protocols \
          llvm-18-dev

    - name: Install and locate LLVM (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        Write-Host "=== clang.exe location ==="
        (Get-Command clang.exe -ErrorAction SilentlyContinue)?.Source
        Write-Host "=== C:\Program Files\LLVM (depth 4) ==="
        if (Test-Path "C:\Program Files\LLVM") {
          Get-ChildItem "C:\Program Files\LLVM" -Depth 4 | ForEach-Object { Write-Host $_.FullName }
        } else { Write-Host "Does not exist" }
        $cfg = Get-ChildItem "C:\Program Files\LLVM" -Recurse -Filter "LLVMConfig.cmake" -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $cfg) {
          Write-Host "=== cmake config not found, running installer ==="
          Invoke-WebRequest -Uri "https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.8/LLVM-18.1.8-win64.exe" -OutFile "$env:TEMP\llvm.exe" -UseBasicParsing
          Start-Process -Wait "$env:TEMP\llvm.exe" -ArgumentList "/S"
          Write-Host "=== After install (depth 4) ==="
          Get-ChildItem "C:\Program Files\LLVM" -Depth 4 | ForEach-Object { Write-Host $_.FullName }
          $cfg = Get-ChildItem "C:\Program Files\LLVM" -Recurse -Filter "LLVMConfig.cmake" -ErrorAction SilentlyContinue | Select-Object -First 1
        }
        if (-not $cfg) { Write-Error "LLVMConfig.cmake not found"; exit 1 }
        $dir = $cfg.DirectoryName -replace '\\', '/'
        Write-Host "LLVM_CMAKE_DIR=$dir"
        "LLVM_CMAKE_DIR=$dir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: '8cce1e1118ea2569d5117f096035671a8490b8f4'

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake (Linux)
      if: runner.os == 'Linux'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
        -DLLVM_DIR=/usr/lib/llvm-18/cmake
        -S ${{ github.workspace }}

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
        "-DLLVM_DIR=${{ env.LLVM_CMAKE_DIR }}"
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }}
